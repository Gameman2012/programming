<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محوّل لوحة المفاتيح العربية</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #0f0f0f;
    color: #e8e4dc;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container {
    width: 100%;
    max-width: 860px;
  }

  .header {
    margin-bottom: 2rem;
    text-align: center;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: #e8e4dc;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 13px;
    color: #6b6860;
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .panel-label {
    font-size: 11px;
    color: #6b6860;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    height: 260px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 16px;
    font-size: 16px;
    color: #e8e4dc;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    resize: none;
    outline: none;
    line-height: 1.7;
    transition: border-color 0.15s;
  }

  textarea::placeholder { color: #3a3a3a; }
  textarea:focus { border-color: #3a3a3a; }

  #input { direction: ltr; text-align: left; }
  #output { direction: rtl; text-align: right; background: #161616; cursor: default; }

  .actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    justify-content: center;
  }

  button {
    font-size: 13px;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid #2a2a2a;
    background: transparent;
    color: #9a9690;
    cursor: pointer;
    transition: all 0.12s;
    letter-spacing: 0.02em;
  }

  button:hover { background: #1e1e1e; color: #e8e4dc; border-color: #3a3a3a; }
  button:active { transform: scale(0.97); }

  .btn-copy {
    background: #e8e4dc;
    color: #0f0f0f;
    border-color: #e8e4dc;
    font-weight: 500;
  }
  .btn-copy:hover { background: #d4d0c8; color: #0f0f0f; border-color: #d4d0c8; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #e8e4dc;
    color: #0f0f0f;
    border-radius: 8px;
    padding: 9px 22px;
    font-size: 13px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>محوّل لوحة المفاتيح ← العربية</h1>
    <p>الصق النص المكتوب بالإنجليزية للحصول على العربية فوراً</p>
  </div>

  <div class="panels">
    <div>
      <div class="panel-label">النص الإنجليزي</div>
      <textarea id="input" placeholder="اكتب أو الصق النص هنا..." spellcheck="false" autofocus></textarea>
    </div>
    <div>
      <div class="panel-label">النص العربي</div>
      <textarea id="output" readonly placeholder="سيظهر النص العربي هنا..."></textarea>
    </div>
  </div>

  <div class="actions">
    <button onclick="clearAll()">مسح</button>
    <button onclick="swapText()">⇅ نقل</button>
    <button class="btn-copy" onclick="copyOutput()">نسخ النتيجة</button>
  </div>
</div>

<div class="toast" id="toast">✓ تم النسخ</div>

<script>
const MAP = {
  '`':'ذ','q':'ض','w':'ص','e':'ث','r':'ق','t':'ف','y':'غ','u':'ع','i':'ه','o':'خ',
  'p':'ح','[':'ج',']':'د','a':'ش','s':'س','d':'ي','f':'ب','g':'ل','h':'ا',
  'j':'ت','k':'ن','l':'م',';':'ك',"'":'ط','z':'ئ','x':'ء','c':'ؤ','v':'ر',
  'b':'ﻻ','n':'ى','m':'ة',',':'و','.':'ز','/':'ظ',
  '~':'ً','Q':'ٌ','W':'َ','E':'ُ','R':'ّ','T':'ﻹ','Y':'إ','U':'`','I':'÷',
  'O':'×','P':'؛','{':'<','}':'>','A':'ٍ','S':'ِ','D':']','F':'[','G':'ﻷ',
  'H':'أ','J':'ـ','K':'،','L':'/',':"':':','"':'"','Z':'~','X':'ْ','C':'}',
  'V':'{','B':'ﻵ','N':'آ','M':"'",'<':',','>':'.','?':'؟'
};

function convert(text) {
  return text.split('').map(c => MAP[c] !== undefined ? MAP[c] : c).join('');
}

const inp = document.getElementById('input');
const out = document.getElementById('output');

inp.addEventListener('input', () => { out.value = convert(inp.value); });

function clearAll() { inp.value = ''; out.value = ''; inp.focus(); }

function swapText() {
  inp.value = out.value;
  out.value = convert(inp.value);
}

function copyOutput() {
  if (!out.value) return;
  navigator.clipboard.writeText(out.value).catch(() => {
    out.select(); document.execCommand('copy');
  });
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
</script>

</body>
</html>
