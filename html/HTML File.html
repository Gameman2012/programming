<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض ملاحظة</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .note-box {
            background-color: #fff3cd;
            color: #856404;
            border-right: 5px solid #ffc107; /* شريط جانبي للملاحظة */
            padding: 15px 20px;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        .note-title {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <div class="note-box">
        <div class="note-title">💡 تنبيه:</div>
        <p style="margin: 0;">افتح تطبيقات الخلفية:واتساب/تلجرام/دسكورد/تيمز</p>
    </div>

</body>
</html>
